<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>OptiMeal | Mess Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            color-scheme: dark;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-gray-900 via-slate-900 to-gray-800 p-4 md:p-8 min-h-screen flex flex-col text-gray-100">
    <header class="max-w-5xl mx-auto w-full mb-8 text-center md:text-left flex items-center gap-3">
        <div class="bg-indigo-500 text-white p-2 rounded-xl shadow-lg shadow-indigo-500/20">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z">
                </path>
            </svg>
        </div>
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
            OptiMeal</h1>
    </header>

    <div class="max-w-5xl mx-auto w-full flex-1 grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Log Form Box -->
        <div
            class="bg-gray-800/60 backdrop-blur-xl border border-gray-700/50 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col transition-all hover:shadow-[0_0_30px_rgba(79,70,229,0.1)]">
            <h2 class="text-2xl font-bold mb-6 text-gray-100">Log Daily Waste</h2>
            <form id="logForm" class="space-y-5 flex-1 flex flex-col">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Date</label>
                    <input type="date" id="date" required
                        class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700 text-gray-100 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all shadow-inner placeholder-gray-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Menu Item</label>
                    <input type="text" id="menu_item" placeholder="e.g. Jeera Rice" required
                        class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700 text-gray-100 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all shadow-inner placeholder-gray-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Cooked (kg)</label>
                        <input type="number" step="0.1" id="amount_cooked" placeholder="0.0" required
                            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700 text-gray-100 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all shadow-inner placeholder-gray-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Consumed (kg)</label>
                        <input type="number" step="0.1" id="amount_consumed" placeholder="0.0" required
                            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-700 text-gray-100 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all shadow-inner placeholder-gray-500">
                    </div>
                </div>
                <div class="mt-auto pt-4">
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-indigo-500/20 transition-all transform hover:-translate-y-0.5">Submit
                        Log</button>
                </div>
            </form>
            <div id="statusMessage"
                class="mt-4 text-center text-sm font-semibold h-5 text-indigo-400 transition-opacity"></div>
        </div>

        <!-- Recent Logs Box -->
        <div
            class="bg-gray-800/60 backdrop-blur-xl border border-gray-700/50 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col transition-all hover:shadow-[0_0_30px_rgba(79,70,229,0.1)]">
            <h2 class="text-2xl font-bold mb-6 text-gray-100 flex items-center justify-between">
                Recent Logs
                <span
                    class="text-xs font-medium bg-indigo-500/20 border border-indigo-500/30 text-indigo-300 px-3 py-1 rounded-full">Live
                    Updates</span>
            </h2>
            <div class="overflow-y-auto flex-1 h-0 pr-2 custom-scrollbar">
                <ul id="logsList" class="space-y-4"></ul>
            </div>
        </div>
    </div>

    <style>
        /* Custom scrollbar for webkit */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.4);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }

        /* Style date input calendar icon for dark mode */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.7;
        }
    </style>

    <script>
        const API_URL = 'http://127.0.0.1:5000/logs';

        document.addEventListener('DOMContentLoaded', fetchLogs);

        document.getElementById('logForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('statusMessage');
            msg.textContent = "Saving...";
            msg.className = "mt-4 text-center text-sm font-semibold h-5 text-indigo-400";

            const data = {
                date: document.getElementById('date').value,
                menu_item: document.getElementById('menu_item').value,
                amount_cooked_kg: document.getElementById('amount_cooked').value,
                amount_consumed_kg: document.getElementById('amount_consumed').value
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    msg.textContent = "Successfully logged!";
                    msg.className = "mt-4 text-center text-sm font-semibold h-5 text-green-400";
                    document.getElementById('logForm').reset();
                    fetchLogs();
                    setTimeout(() => msg.textContent = '', 3000);
                } else {
                    msg.textContent = "Error saving log.";
                    msg.className = "mt-4 text-center text-sm font-semibold h-5 text-red-400";
                }
            } catch (err) {
                msg.textContent = "Network Error.";
                msg.className = "mt-4 text-center text-sm font-semibold h-5 text-red-400";
            }
        });

        async function fetchLogs() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) return;
                const logs = await res.json();
                const list = document.getElementById('logsList');

                if (logs.length === 0) {
                    list.innerHTML = `<li class="text-center text-gray-500 py-8 text-sm">No logs recorded yet.</li>`;
                    return;
                }

                list.innerHTML = logs.map(l => `
                    <li class="p-4 bg-gray-900/40 border border-gray-700/50 rounded-2xl shadow-sm hover:border-gray-600 transition-all flex justify-between items-center group">
                        <div class="flex flex-col">
                            <span class="font-semibold text-gray-100 text-lg group-hover:text-indigo-400 transition-colors">${l.menu_item}</span>
                            <span class="text-xs text-gray-400 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                ${l.date}
                            </span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-red-400 font-bold bg-red-500/10 px-3 py-1 rounded-xl border border-red-500/20">${l.food_waste_kg} kg</span>
                            <span class="text-[10px] text-gray-500 mt-1 uppercase tracking-wider font-semibold">Waste</span>
                        </div>
                    </li>
                `).join('');
            } catch (err) {
                console.error("Error fetching logs:", err);
            }
        }
    </script>
</body>

</html>
